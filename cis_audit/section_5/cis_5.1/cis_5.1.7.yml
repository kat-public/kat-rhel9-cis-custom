---

{{ if .Vars.rhel9cis_level_1 }}
  {{ if .Vars.rhel9cis_rule_5_1_7 }}
command:
  sshd_access_limited:
    title: 5.1.7 | Ensure SSH access is limited | config
    exec: grep -Ei "^(Allow|Deny)(Users|Groups)" /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/(?i)AllowUsers: {{ .Vars.rhel9cis_sshd_allowusers }}/'
    - '/(?i)AllowGroups: {{ .Vars.rhel9cis_sshd_allowgroups }}/'
    - '/(?i)DenyUsers: {{ .Vars.rhel9cis_sshd_denyusers }}/'
    - '/(?i)DenyGroups: {{ .Vars.rhel9cis_sshd_denygroups }}/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.7
      CISv8: 3.3
      CISv8_IG1: true
      CISv8_IG2: true
      CISv8_IG3: true
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
